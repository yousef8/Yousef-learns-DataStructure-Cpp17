<svg width="560" height="340" viewBox="0 0 560 340" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="gradientPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#6366f1"/>
    <stop offset="100%" stop-color="#06b6d4"/>
  </linearGradient>

  <linearGradient id="gradientAccent" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f59e0b"/>
    <stop offset="100%" stop-color="#ef4444"/>
  </linearGradient>
</defs>

<style>
.title {
  font-family: system-ui, -apple-system, Segoe UI, Roboto;
  font-size: 22px;
  font-weight: 700;
  fill: url(#gradientPrimary);
  text-anchor: middle;
}

.node {
  fill: rgba(99,102,241,0.08);
  stroke: url(#gradientPrimary);
  stroke-width: 2.5;
}

.edge {
  stroke: #94a3b8;
  stroke-width: 2;
  stroke-linecap: round;
}

.text {
  font-family: system-ui, -apple-system, Segoe UI, Roboto;
  font-size: 12px;
  font-weight: 600;
  fill: #334155;
  text-anchor: middle;
  dominant-baseline: middle;
}

.cell {
  fill: rgba(6,182,212,0.06);
  stroke: url(#gradientPrimary);
  stroke-width: 1.6;
}

.accent {
  stroke: url(#gradientAccent);
  stroke-width: 2.2;
}

</style>

<!-- Title -->
<text class="title" x="280" y="30">Binary Heap</text>

<!-- Tree -->
<circle class="node" cx="280" cy="80" r="18"/>
<text class="text" x="280" y="80">2</text>

<circle class="node" cx="200" cy="130" r="15"/>
<text class="text" x="200" y="130">6</text>

<circle class="node" cx="360" cy="130" r="15"/>
<text class="text" x="360" y="130">8</text>

<circle class="node" cx="160" cy="180" r="13"/>
<text class="text" x="160" y="180">14</text>

<circle class="node" cx="240" cy="180" r="13"/>
<text class="text" x="240" y="180">7</text>

<circle class="node" cx="320" cy="180" r="13"/>
<text class="text" x="320" y="180">10</text>

<circle class="node" cx="400" cy="180" r="13"/>
<text class="text" x="400" y="180">19</text>

<!-- Edges -->
<line class="edge" x1="280" y1="98" x2="200" y2="115"/>
<line class="edge" x1="280" y1="98" x2="360" y2="115"/>

<line class="edge" x1="200" y1="145" x2="160" y2="167"/>
<line class="edge" x1="200" y1="145" x2="240" y2="167"/>

<line class="edge" x1="360" y1="145" x2="320" y2="167"/>
<line class="edge" x1="360" y1="145" x2="400" y2="167"/>

<!-- Divider -->
<line class="accent" x1="120" y1="220" x2="440" y2="220"/>

<!-- Array -->
<g transform="translate(140,240)">
<rect class="cell" x="0" y="0" width="40" height="32"/>
<rect class="cell" x="40" y="0" width="40" height="32"/>
<rect class="cell" x="80" y="0" width="40" height="32"/>
<rect class="cell" x="120" y="0" width="40" height="32"/>
<rect class="cell" x="160" y="0" width="40" height="32"/>
<rect class="cell" x="200" y="0" width="40" height="32"/>
<rect class="cell" x="240" y="0" width="40" height="32"/>

<text class="text" x="20" y="16">2</text>
<text class="text" x="60" y="16">6</text>
<text class="text" x="100" y="16">8</text>
<text class="text" x="140" y="16">14</text>
<text class="text" x="180" y="16">7</text>
<text class="text" x="220" y="16">10</text>
<text class="text" x="260" y="16">19</text>

</g>

</svg>