<svg width="900" height="640" viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg">

<style>
:root {
  --stroke: #94a3b8;
}

.circle {
  fill: none;
  stroke: var(--stroke);
  stroke-width: 2.5;
}

.text {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  font-size: 14px;
  text-anchor: middle;
  dominant-baseline: middle;
  fill: #94a3b8;
  font-weight: 500;
}

.line {
  stroke: var(--stroke);
  stroke-width: 2;
  stroke-linecap: round;
}

.cell {
  fill: none;
  stroke: var(--stroke);
  stroke-width: 2;
}

.header {
  font-weight: 600;
}

.blue {
  fill: #2563eb;
  font-weight: 600;
}

</style>

